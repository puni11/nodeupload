name: Build, Push & Deploy Upload Server

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/upload-server:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/upload-server:latest

      # 🔥 OPTIONAL: Delete old dangling images in CI
      - name: Cleanup local images
        run: docker image prune -f

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASS }}" ssh \
            -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

            echo "🧹 Cleaning old Docker images..."
            docker image prune -af || true

            echo "🚀 Pulling latest image..."
            docker pull ghcr.io/${{ github.repository_owner }}/upload-server:latest

            echo "🛑 Stopping old container..."
            docker stop upload-server || true
            docker rm upload-server || true

            echo "▶️ Starting new container..."
            docker run -d \
              -p 4100:3000 \
              -v /root/upload-server-data:/app/uploads \
              --name upload-server \
              --restart unless-stopped \
              ghcr.io/${{ github.repository_owner }}/upload-server:latest

            echo "🧹 Removing unused images..."
            docker system prune -f || true

            echo "✅ Deployment complete!"
          EOF